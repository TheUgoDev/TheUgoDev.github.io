<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armadio Digitale AI - Registrazione</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Armadio Digitale</h1>
        <p>Crea il tuo account per gestire il tuo armadio personale.</p>

        <div class="form-container">
            <h2>Registrazione</h2>
            <input type="text" id="reg-username" placeholder="Nome Utente" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button id="reg-button" onclick="handleRegister()">Crea Account</button>

            <p id="reg-error" class="error"></p>
            <p id="reg-success" style="color: green;"></p>

            <hr>
            <p><a href="index.html">Torna al Login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 <a href="https://theugodev.github.io/" target="_blank" class="footer-link">TheUgoDev</a>. All Rights Reserved.</p>
        <p>Backend & AI Solutions</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
