
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wardrobe - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Wardrobe</h1>
        <p>Il tuo stile, potenziato dall'Intelligenza Artificiale.</p>
        
        <div id="login-form" class="form-container">
            <h2>Accedi</h2>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="handleLogin()">Entra nell'armadio</button>
            <p id="error-msg" class="error"></p>
        </div>

        <div id="wardrobe-section" class="hidden">
            <h2>Benvenuto, <span id="user-name"></span>!</h2>
            <div id="clothes-grid" class="grid"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
